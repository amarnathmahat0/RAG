---
apiVersion: v1
kind: Service
metadata:
  name: nexus-rag-svc
  namespace: nexus-rag
  labels:
    app: nexus-rag
spec:
  selector:
    app: nexus-rag
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-rag-ingress
  namespace: nexus-rag
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: nexus-rag.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-rag-svc
                port:
                  number: 80
