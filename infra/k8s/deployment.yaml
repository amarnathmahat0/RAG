apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-rag-api
  namespace: nexus-rag
  labels:
    app: nexus-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-rag
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nexus-rag
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: nexus-rag-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: nexus-rag-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
            - name: reports-volume
              mountPath: /app/reports
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: nexus-rag-data-pvc
        - name: reports-volume
          emptyDir: {}
